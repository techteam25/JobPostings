worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # SSL settings (shared across server blocks)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Rate limiting zone (general protection)
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

    # --- HTTP: ACME challenge + redirect to HTTPS ---
    server {
        listen 80;
        server_name api.getinvolved.team site.getinvolved.team;

        # Let certbot verify domain ownership
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- Backend: api.getinvolved.team ---
    server {
        listen 443 ssl;
        server_name api.getinvolved.team;

        ssl_certificate     /etc/letsencrypt/live/api.getinvolved.team/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.getinvolved.team/privkey.pem;

        # File uploads (multer limit in the backend)
        client_max_body_size 10m;

        location / {
            proxy_pass http://backend:5500;
            proxy_http_version 1.1;

            # WebSocket support
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;

            # Forward client info
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # --- Frontend: site.getinvolved.team ---
    server {
        listen 443 ssl;
        server_name site.getinvolved.team;

        ssl_certificate     /etc/letsencrypt/live/site.getinvolved.team/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/site.getinvolved.team/privkey.pem;

        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;

            # WebSocket support (Next.js HMR in dev, general resilience in prod)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;

            # Forward client info
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
