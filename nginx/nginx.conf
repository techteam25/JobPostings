worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide nginx version in response headers
    server_tokens off;

    # Performance
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Client buffer sizes
    client_body_buffer_size   10K;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # Client timeouts
    client_body_timeout   12;
    client_header_timeout 12;
    send_timeout          10;

    # Gzip
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types      text/plain text/css text/xml text/javascript
                    application/json application/javascript application/xml+rss;

    # Logging — custom format with request time for performance debugging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # SSL settings (shared across server blocks)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m     rate=100r/m;

    # Upstreams with connection pooling
    upstream backend_pool {
        server backend:5500 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    upstream frontend_pool {
        server frontend:3000;
        keepalive 64;
    }

    # --- HTTP: ACME challenge + redirect to HTTPS ---
    server {
        listen 80;
        listen [::]:80;
        server_name api.getinvolved.team site.getinvolved.team;

        # Let certbot verify domain ownership
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- Backend: api.getinvolved.team ---
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name api.getinvolved.team;

        ssl_certificate     /etc/letsencrypt/live/api.getinvolved.team/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.getinvolved.team/privkey.pem;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header X-Content-Type-Options    "nosniff" always;

        # File uploads (multer limit in the backend)
        client_max_body_size 10m;

        location / {
            limit_req zone=api burst=50 nodelay;

            proxy_pass         http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";

            # WebSocket support
            proxy_set_header Upgrade    $http_upgrade;
            proxy_cache_bypass $http_upgrade;

            # Forward client info
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Proxy buffer sizes (large cookies/headers)
            proxy_buffer_size      16k;
            proxy_buffers          8 16k;
            proxy_busy_buffers_size 32k;

            # Proxy timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Handle preflight requests at nginx level (faster than hitting the app)
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin  "https://site.getinvolved.team" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
                add_header Access-Control-Max-Age       3600;
                add_header Content-Length  0;
                add_header Content-Type    text/plain;
                # Re-add security headers (nginx clears them inside if blocks)
                add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
                add_header X-Frame-Options           "SAMEORIGIN" always;
                add_header X-XSS-Protection          "1; mode=block" always;
                add_header X-Content-Type-Options    "nosniff" always;
                return 204;
            }
        }

        # Per-site logging
        access_log /var/log/nginx/backend-access.log main;
        error_log  /var/log/nginx/backend-error.log;
    }

    # --- Frontend: site.getinvolved.team ---
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name site.getinvolved.team;

        ssl_certificate     /etc/letsencrypt/live/site.getinvolved.team/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/site.getinvolved.team/privkey.pem;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header X-Content-Type-Options    "nosniff" always;

        # Next.js hashed static assets — cache aggressively
        location /_next/static/ {
            proxy_pass         http://frontend_pool;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            expires 365d;
            access_log off;
            add_header Cache-Control "public, immutable";
        }

        # Images — long cache
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
            proxy_pass         http://frontend_pool;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            expires 365d;
            add_header Cache-Control "public, max-age=31536000";
        }

        # CSS/JS (non-hashed) — shorter cache
        location ~* \.(css|js)$ {
            proxy_pass         http://frontend_pool;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        # Everything else (HTML pages, API routes, etc.)
        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass         http://frontend_pool;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";

            # WebSocket support (general resilience)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_cache_bypass $http_upgrade;

            # Forward client info
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Proxy buffer sizes (large cookies/headers)
            proxy_buffer_size      16k;
            proxy_buffers          8 16k;
            proxy_busy_buffers_size 32k;

            # Proxy timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Never cache HTML pages — always serve fresh
            proxy_cache_bypass 1;
            proxy_no_cache     1;
        }

        # Per-site logging
        access_log /var/log/nginx/frontend-access.log main;
        error_log  /var/log/nginx/frontend-error.log;
    }
}
