# Production Docker Compose — all services in one file
# Usage: docker compose -f docker-compose.prod.yml up -d
# Env:   .env.production (copy from .env.production.example)

services:
  # ===== Infrastructure =====

  db:
    image: mysql:9.4.0
    container_name: jobpostings-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis-cache:
    image: redis:8.2-alpine
    container_name: redis-cache
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_CACHE_PWD}
    volumes:
      - redis_cache_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_CACHE_PWD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  redis-queue:
    image: redis:8.2-alpine
    container_name: redis-queue
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_QUEUE_PWD}
    volumes:
      - redis_queue_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_QUEUE_PWD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  redis-rate-limiter:
    image: redis:8.2-alpine
    container_name: redis-rate-limiter
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_RATE_LIMITER_PWD}
    volumes:
      - redis_rate_limiter_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_RATE_LIMITER_PWD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  typesense:
    image: typesense/typesense:30.0.rc26
    container_name: typesense
    restart: unless-stopped
    command: "--data-dir /data --api-key=${TYPESENSE_API_KEY} --enable-cors"
    volumes:
      - typesense_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8108/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ===== Application =====

  backend:
    image: ${BACKEND_IMAGE}
    container_name: jobpostings-backend
    restart: unless-stopped
    env_file: .env.production
    volumes:
      # Mount Firebase service account key (never bake into image)
      - ./secrets/firebase-sa.json:/app/secrets/firebase-sa.json:ro
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      redis-rate-limiter:
        condition: service_healthy
      typesense:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:5500/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: jobpostings-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      # Runtime env for SSR/middleware (also baked at build time for client bundle)
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
      NEXT_PUBLIC_FRONTEND_URL: ${NEXT_PUBLIC_FRONTEND_URL}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ===== Reverse Proxy + SSL =====

  nginx:
    image: nginx:1.27-alpine
    container_name: jobpostings-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount the server's existing Let's Encrypt certs
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    # Reload every 6 hours to pick up renewed SSL certificates
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''

  certbot:
    image: certbot/certbot
    container_name: jobpostings-certbot
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Check for renewal every 12 hours (certbot only renews if certs are near expiry)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  mysql_data:
  redis_cache_data:
    driver: local
  redis_queue_data:
    driver: local
  redis_rate_limiter_data:
    driver: local
  typesense_data:
  certbot_www:
